name: 全量重试

on:
  workflow_dispatch:

jobs:
  retry-image:
    name: 全量重试 图片
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TWITTER_PROXY_BASE: ${{ secrets.TWITTER_PROXY_BASE }}
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 读取账号列表
        id: info
        run: |
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          if [ -f "accounts.txt" ]; then
            ACCOUNTS=$(grep -v '^#' accounts.txt | grep -v '^$')
          else
            ACCOUNTS="$REPO"
          fi
          echo "accounts<<EOF" >> $GITHUB_OUTPUT
          echo "$ACCOUNTS"     >> $GITHUB_OUTPUT
          echo "EOF"           >> $GITHUB_OUTPUT

      - name: 检查数据目录
        id: check
        run: |
          SKIP=true
          while IFS= read -r U; do
            if [ -z "$U" ]; then continue; fi
            if [ -d "accounts/${U}/wayback_snapshots" ]; then
              SKIP=false
              break
            fi
          done <<< "${{ steps.info.outputs.accounts }}"
          echo "skip=$SKIP" >> $GITHUB_OUTPUT
          if [ "$SKIP" = "true" ]; then echo "⚠️ 请先运行首次建档"; fi

      - name: 安装依赖
        if: steps.check.outputs.skip == 'false'
        run: pip install requests beautifulsoup4 lxml

      - name: 拉取最新 archive.py
        if: steps.check.outputs.skip == 'false'
        run: curl -fsSL "https://raw.githubusercontent.com/sjshb57/Test/main/archive.py" -o /tmp/archive.py

      - name: retry --image-failed-all
        if: steps.check.outputs.skip == 'false'
        run: |
          while IFS= read -r U; do
            if [ -z "$U" ]; then continue; fi
            if [ ! -d "accounts/${U}/wayback_snapshots" ]; then continue; fi
            cd accounts/${U} && python3 /tmp/archive.py retry --image-failed-all || true
            cd ../..
          done <<< "${{ steps.info.outputs.accounts }}"

      - name: clean-html --force
        if: steps.check.outputs.skip == 'false'
        run: |
          while IFS= read -r U; do
            if [ -z "$U" ]; then continue; fi
            if [ ! -d "accounts/${U}/wayback_snapshots" ]; then continue; fi
            cd accounts/${U} && python3 /tmp/archive.py clean-html --force || true
            cd ../..
          done <<< "${{ steps.info.outputs.accounts }}"

      - name: 推送
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --name-only | while IFS= read -r f; do
            if [ ! -f "$f" ]; then continue; fi
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -gt 104857600 ]; then git rm --cached "$f"; fi
          done
          git diff --cached --quiet && echo "无新内容" && exit 0
          COUNT=$(git diff --cached --numstat | wc -l)
          git commit -m "🔁 全量重试 图片 (+${COUNT} 文件) $(date -u +%Y-%m-%d) [skip ci]"
          git push

  retry-video:
    name: 全量重试 视频
    needs: retry-image
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TWITTER_PROXY_BASE: ${{ secrets.TWITTER_PROXY_BASE }}
    permissions:
      contents: write

    steps:
      - name: 检出仓库（拉最新）
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: 读取账号列表
        id: info
        run: |
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          if [ -f "accounts.txt" ]; then
            ACCOUNTS=$(grep -v '^#' accounts.txt | grep -v '^$')
          else
            ACCOUNTS="$REPO"
          fi
          echo "accounts<<EOF" >> $GITHUB_OUTPUT
          echo "$ACCOUNTS"     >> $GITHUB_OUTPUT
          echo "EOF"           >> $GITHUB_OUTPUT

      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml

      - name: 拉取最新 archive.py
        run: curl -fsSL "https://raw.githubusercontent.com/sjshb57/Test/main/archive.py" -o /tmp/archive.py

      - name: retry --video-failed-all
        run: |
          while IFS= read -r U; do
            if [ -z "$U" ]; then continue; fi
            if [ ! -d "accounts/${U}/wayback_snapshots" ]; then continue; fi
            cd accounts/${U} && python3 /tmp/archive.py retry --video-failed-all || true
            cd ../..
          done <<< "${{ steps.info.outputs.accounts }}"

      - name: clean-html --force
        run: |
          while IFS= read -r U; do
            if [ -z "$U" ]; then continue; fi
            if [ ! -d "accounts/${U}/wayback_snapshots" ]; then continue; fi
            cd accounts/${U} && python3 /tmp/archive.py clean-html --force || true
            cd ../..
          done <<< "${{ steps.info.outputs.accounts }}"

      - name: 推送
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --name-only | while IFS= read -r f; do
            if [ ! -f "$f" ]; then continue; fi
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -gt 104857600 ]; then git rm --cached "$f"; fi
          done
          git diff --cached --quiet && echo "无新内容" && exit 0
          COUNT=$(git diff --cached --numstat | wc -l)
          git commit -m "🔁 全量重试 视频 (+${COUNT} 文件) $(date -u +%Y-%m-%d) [skip ci]"
          git push

  retry-avatar:
    name: 全量重试 头像+收尾
    needs: retry-video
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TWITTER_PROXY_BASE: ${{ secrets.TWITTER_PROXY_BASE }}
    permissions:
      contents: write

    steps:
      - name: 检出仓库（拉最新）
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: 读取账号列表
        id: info
        run: |
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          if [ -f "accounts.txt" ]; then
            ACCOUNTS=$(grep -v '^#' accounts.txt | grep -v '^$')
          else
            ACCOUNTS="$REPO"
          fi
          echo "accounts<<EOF" >> $GITHUB_OUTPUT
          echo "$ACCOUNTS"     >> $GITHUB_OUTPUT
          echo "EOF"           >> $GITHUB_OUTPUT

      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml

      - name: 拉取最新 archive.py
        run: curl -fsSL "https://raw.githubusercontent.com/sjshb57/Test/main/archive.py" -o /tmp/archive.py

      - name: retry --avatar-failed-all
        run: |
          while IFS= read -r U; do
            if [ -z "$U" ]; then continue; fi
            if [ ! -d "accounts/${U}/wayback_snapshots" ]; then continue; fi
            cd accounts/${U} && python3 /tmp/archive.py retry --avatar-failed-all || true
            cd ../..
          done <<< "${{ steps.info.outputs.accounts }}"

      - name: clean-html --force
        run: |
          while IFS= read -r U; do
            if [ -z "$U" ]; then continue; fi
            if [ ! -d "accounts/${U}/wayback_snapshots" ]; then continue; fi
            cd accounts/${U} && python3 /tmp/archive.py clean-html --force || true
            cd ../..
          done <<< "${{ steps.info.outputs.accounts }}"

      - name: build-index
        run: |
          while IFS= read -r U; do
            if [ -z "$U" ]; then continue; fi
            if [ ! -d "accounts/${U}/wayback_snapshots" ]; then continue; fi
            cd accounts/${U} && python3 /tmp/archive.py build-index || true
            cd ../..
          done <<< "${{ steps.info.outputs.accounts }}"

      - name: 推送
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --name-only | while IFS= read -r f; do
            if [ ! -f "$f" ]; then continue; fi
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -gt 104857600 ]; then git rm --cached "$f"; fi
          done
          if git diff --cached --quiet; then echo "✅ 无新内容"; exit 0; fi
          COUNT=$(git diff --cached --numstat | wc -l)
          git commit -m "✅ 全量重试完成 (+${COUNT} 文件) $(date -u +%Y-%m-%d) [skip ci]"
          git push
